<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Food Insights | 서비스 소개</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
    </style>
</head>

<body class="min-h-screen p-8 text-white">

    <div class="grid lg:grid-cols-2 gap-12 max-w-7xl mx-auto items-center min-h-[90vh]">

        <!-- 좌측: 정보 영역 -->
        <section class="space-y-8">
            <span
                class="bg-rose-500/20 text-rose-400 border border-rose-500/50 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest">
                VOC DATA REPORT
            </span>
            <h1 class="text-6xl font-black tracking-tighter leading-tight">
                K-Food <span class="text-rose-500">맛은 기대했는데...</span><br>왜 1점이 됐을까?
            </h1>
            <p class="text-xl text-slate-400 leading-relaxed max-w-lg">
                1,237건의 <strong class="text-white">1점 리뷰 데이터를 분석</strong>하여, 외국인 고객 경험의
                <strong class="text-rose-400">핵심 문제와 운영 개선 포인트</strong>를 시각화했습니다.
            </p>
            <div class="space-y-4">
                <p class="text-slate-300 italic">"고객은 음식보다 '경험 품질'에 더 크게 실망했습니다."</p>
                <div class="flex gap-4">
                    <a href="dashboard.html"
                        class="bg-rose-600 hover:bg-rose-700 px-8 py-4 rounded-xl font-bold transition-all flex items-center gap-2">
                        고객 불만 분석 하기 <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </section>

        <!-- 우측: 데이터 시각화 및 카드 영역 -->
        <section class="grid grid-cols-2 lg:grid-cols-3 gap-4">

            <!-- 지표 카드 6개 -->
            <div class="card p-4 text-center">
                <div class="text-[10px] text-slate-400 uppercase mb-1">총 리뷰 건수</div>
                <div class="text-xl font-bold text-white">1,237</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-[10px] text-slate-400 uppercase mb-1">불만 키워드</div>
                <div class="text-xl font-bold text-rose-400">불친절</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-[10px] text-slate-400 uppercase mb-1">외국인 리뷰 비중</div>
                <div class="text-xl font-bold text-blue-400">40%</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-[10px] text-slate-400 uppercase mb-1">위생 불만 언급</div>
                <div class="text-xl font-bold text-emerald-400">2%</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-[10px] text-slate-400 uppercase mb-1">이탈 신호 증가율</div>
                <div class="text-xl font-bold text-amber-400">+12%</div>
            </div>
            <div class="card p-4 text-center">
                <div class="text-[10px] text-slate-400 uppercase mb-1">피크타임 불만율</div>
                <div class="text-xl font-bold text-purple-400">+25%</div>
            </div>


        </section>
    </div>

    <script>
        new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: ['1', '2', '3', '4'], datasets: [{ data: [90, 70, 50, 40], borderColor: '#e11d48', fill: false }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
    </script>
</body>

</html>
